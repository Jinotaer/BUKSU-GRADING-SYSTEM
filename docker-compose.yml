version: '3.8'

services:

  # ── Express API ───────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    # Secrets are read from the file at runtime, never baked into the image.
    env_file: ./backend/.env
    environment:
      - PORT=5000
      # Allow requests from the DigitalOcean server origin.
      # This must match the browser's origin (scheme + host, no path).
      - FRONTEND_URL=http://167.172.73.9
      # Use development mode so session cookies don't require HTTPS.
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - app-network

  # ── React SPA served by Nginx ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Must match your server username exactly (e.g. /jino_taer).
        # Set BASE_PATH in the root .env file.
        - VITE_BASE_PATH=${BASE_PATH}
    ports:
      # Map your ASSIGNED_PORT on the host to port 80 inside the container.
      # Set ASSIGNED_PORT in the root .env file.
      - "${ASSIGNED_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
